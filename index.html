<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Math Challenge!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');

        :root {
            --primary: #7c3aed;
            --primary-light: #a855f7;
            --primary-glow: rgba(124, 58, 237, 0.35);
            --bg: #09090f;
            --card-bg: #12121e;
            --border: rgba(255,255,255,0.07);
            --text: #f1f0ff;
            --muted: #6b6b8a;
            --correct: #22c55e;
            --wrong: #ef4444;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 60% 40%, rgba(124,58,237,0.12) 0%, transparent 55%),
                        radial-gradient(ellipse at 20% 80%, rgba(168,85,247,0.07) 0%, transparent 45%);
            pointer-events: none;
        }

        #game-container {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem;
            width: 92%;
            max-width: 560px;
            box-shadow: 0 0 0 1px rgba(124,58,237,0.15), 0 24px 64px rgba(0,0,0,0.5);
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--primary-light);
        }

        .progress-wrap { display: flex; gap: 6px; }

        .progress-dot {
            width: 32px;
            height: 5px;
            border-radius: 99px;
            background: var(--border);
            transition: background 0.3s ease;
        }
        .progress-dot.done   { background: var(--primary); }
        .progress-dot.active { background: var(--primary-light); }

        /* ── Timer ── */
        .timer-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .timer-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            transition: width 0.1s linear, background 0.5s;
        }
        .timer-bar.urgent { background: linear-gradient(90deg, var(--wrong), #f97316); }

        .timer-countdown {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--muted);
            min-width: 28px;
            text-align: right;
            transition: color 0.3s;
        }
        .timer-countdown.urgent { color: var(--wrong); }

        /* ── Question ── */
        .question-number {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }

        #question {
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.03em;
            margin-bottom: 0.25rem;
            line-height: 1;
        }

        .question-hint {
            font-size: 0.82rem;
            color: var(--muted);
            margin-bottom: 1.75rem;
        }

        /* ── Options ── */
        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 0;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border: 1.5px solid var(--border);
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.18s ease;
            user-select: none;
            animation: popIn 0.2s ease backwards;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .option-label:nth-child(1) { animation-delay: 0.05s; }
        .option-label:nth-child(2) { animation-delay: 0.10s; }
        .option-label:nth-child(3) { animation-delay: 0.15s; }
        .option-label:nth-child(4) { animation-delay: 0.20s; }

        .option-label:hover,
        .option-label:active {
            border-color: var(--primary);
            background: rgba(124,58,237,0.08);
            transform: translateY(-2px);
        }

        .option-label.correct {
            border-color: var(--correct);
            background: rgba(34,197,94,0.12);
            transform: none;
        }

        .option-label.wrong {
            border-color: var(--wrong);
            background: rgba(239,68,68,0.1);
            animation: wrongShake 0.35s ease;
        }

        .option-label.disabled {
            pointer-events: none;
        }

        .option-label.disabled:not(.correct):not(.wrong) {
            opacity: 0.4;
        }

        .option-key {
            width: 30px;
            height: 30px;
            border-radius: 9px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--muted);
            flex-shrink: 0;
            transition: all 0.18s;
        }

        .option-label:hover .option-key,
        .option-label:active .option-key { background: var(--primary); color: white; }
        .option-label.correct .option-key { background: var(--correct); color: white; }
        .option-label.wrong   .option-key { background: var(--wrong);   color: white; }

        .option-val {
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 700;
        }

        .option-label input { display: none; }

        /* ── Score bar ── */
        .score-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.25rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .score-label { font-size: 0.78rem; color: var(--muted); }
        .score-val   { font-size: 0.95rem; font-weight: 700; color: var(--accent); }

        .streak { font-size: 0.78rem; color: var(--accent); font-weight: 700; display: none; }
        .streak.show { display: block; }

        /* ── Result screen ── */
        #result-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            background: var(--bg);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
        }

        #result-screen.show { display: flex; }

        .result-emoji { font-size: 4rem; margin-bottom: 1rem; }

        .result-title {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .result-sub {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .result-score {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.25rem;
            letter-spacing: -0.03em;
        }

        .result-score-label {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2.5rem;
        }

        .play-again-btn {
            padding: 14px 36px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 24px var(--primary-glow);
        }

        .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px var(--primary-glow); }

        /* ── Jumpscare ── */
        #jumpscare {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            cursor: pointer;
        }
        #jumpscare img { width: 100%; height: 100%; object-fit: cover; }

        #jumpscare .restart-hint {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* ── Flash ── */
        .feedback-flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .feedback-flash.correct-flash { background: rgba(34,197,94,0.12); }
        .feedback-flash.wrong-flash   { background: rgba(239,68,68,0.12); }
        .feedback-flash.show          { opacity: 1; }

        /* ── Animations ── */
        @keyframes wrongShake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-5px); }
            40%     { transform: translateX(5px); }
            60%     { transform: translateX(-3px); }
            80%     { transform: translateX(3px); }
        }

        @keyframes popIn {
            0%   { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }

        @keyframes bodyShake {
            0%   { transform: translate(0,0) rotate(0deg); }
            10%  { transform: translate(-8px,-5px) rotate(-1.5deg); }
            20%  { transform: translate(8px,5px) rotate(1.5deg); }
            30%  { transform: translate(-10px,3px) rotate(-2deg); }
            40%  { transform: translate(10px,-3px) rotate(2deg); }
            50%  { transform: translate(-5px,8px) rotate(-1deg); }
            60%  { transform: translate(5px,-8px) rotate(1deg); }
            70%  { transform: translate(-8px,3px) rotate(-1.5deg); }
            80%  { transform: translate(8px,-3px) rotate(1.5deg); }
            90%  { transform: translate(-4px,5px) rotate(-0.5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .shaking { animation: bodyShake 0.07s infinite; }

        /* ── Tablet tweaks (600px+) ── */
        @media (min-width: 600px) {
            #game-container { padding: 3rem 3.5rem; }

            #question { font-size: 3.4rem; }

            #options { gap: 14px; }

            .option-label { padding: 20px 22px; border-radius: 18px; gap: 14px; }

            .option-key { width: 34px; height: 34px; font-size: 0.78rem; border-radius: 10px; }

            .option-val { font-size: 1.25rem; }

            .progress-dot { width: 36px; height: 5px; }
        }

        /* ── Large tablet / small desktop (900px+) ── */
        @media (min-width: 900px) {
            #game-container { max-width: 640px; padding: 3.5rem 4rem; }
        }
    </style>
</head>
<body>

<div class="feedback-flash" id="flash"></div>

<div id="game-container">
    <div class="header">
        <span class="title">⚡ Math Sprint</span>
        <div class="progress-wrap" id="progress"></div>
    </div>

    <div class="timer-row">
        <div class="timer-bar-wrap">
            <div class="timer-bar" id="timer-bar"></div>
        </div>
        <span class="timer-countdown" id="timer-count">15</span>
    </div>

    <div class="question-number" id="q-num">Question 1 of 5</div>
    <div id="question">5 + 7 = ?</div>
    <div class="question-hint">Tap an answer to lock it in</div>

    <div id="options"></div>

    <div class="score-bar">
        <span class="score-label">Score</span>
        <span class="streak" id="streak">🔥 Streak!</span>
        <span class="score-val" id="score-display">0 pts</span>
    </div>
</div>

<!-- Result screen shown before jumpscare -->
<div id="result-screen">
    <div class="result-emoji" id="result-emoji">🎉</div>
    <div class="result-title" id="result-title">Quiz Complete!</div>
    <div class="result-sub" id="result-sub">Here's how you did</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-score-label">points</div>
    <button class="play-again-btn" onclick="startScare()">Continue →</button>
</div>

<div id="jumpscare">
    <img src="https://i.pinimg.com/originals/c3/fe/8a/c3fe8a0d6bcbcdeeb4d310e4f5e598e4.jpg" alt="BOO!">
    <span class="restart-hint">tap anywhere to play again</span>
</div>

<audio id="scream-sound" src="music/scream.mp3" preload="auto"></audio>

<script>
    const questions = [
        { q: "5 + 7",   a: 12, options: [10, 12, 14, 15] },
        { q: "12 − 4",  a: 8,  options: [6, 7, 8, 9] },
        { q: "3 × 3",   a: 9,  options: [6, 9, 12, 18] },
        { q: "10 ÷ 2",  a: 5,  options: [2, 4, 5, 10] },
        { q: "15 + 18", a: 33, options: [30, 31, 33, 35] }
    ];

    const TIMER_SECONDS = 15;
    const POINTS_PER_CORRECT = 100;

    let current = 0, score = 0, streak = 0, bestStreak = 0, correct = 0;
    let timerInterval = null, timeLeft = TIMER_SECONDS, answered = false;

    const questionEl   = document.getElementById('question');
    const qNumEl       = document.getElementById('q-num');
    const optionsEl    = document.getElementById('options');
    const timerBarEl   = document.getElementById('timer-bar');
    const timerCountEl = document.getElementById('timer-count');
    const scoreEl      = document.getElementById('score-display');
    const streakEl     = document.getElementById('streak');
    const progressEl   = document.getElementById('progress');
    const flashEl      = document.getElementById('flash');

    function buildProgress() {
        progressEl.innerHTML = '';
        questions.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'progress-dot' + (i < current ? ' done' : i === current ? ' active' : '');
            progressEl.appendChild(dot);
        });
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = TIMER_SECONDS;
        updateTimerBar();
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            updateTimerBar();
            if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) autoWrong(); }
        }, 100);
    }

    function updateTimerBar() {
        const pct = Math.max(0, (timeLeft / TIMER_SECONDS) * 100);
        timerBarEl.style.width = pct + '%';
        const urgent = timeLeft < 5;
        timerBarEl.classList.toggle('urgent', urgent);
        timerCountEl.classList.toggle('urgent', urgent);
        timerCountEl.textContent = Math.ceil(Math.max(0, timeLeft));
    }

    function autoWrong() {
        answered = true;
        disableOptions();
        streak = 0;
        streakEl.classList.remove('show');
        doFlash('wrong');
        setTimeout(() => nextQuestion(), 900);
    }

    function disableOptions() {
        document.querySelectorAll('.option-label').forEach(l => l.classList.add('disabled'));
    }

    function loadQuestion() {
        answered = false;
        const qd = questions[current];
        qNumEl.textContent = `Question ${current + 1} of ${questions.length}`;
        questionEl.textContent = qd.q + ' = ?';
        buildProgress();

        const shuffled = [...qd.options].sort(() => Math.random() - 0.5);
        optionsEl.innerHTML = '';
        shuffled.forEach((opt, i) => {
            const key = ['A','B','C','D'][i];
            const lbl = document.createElement('label');
            lbl.className = 'option-label';
            lbl.style.animationDelay = (i * 0.05 + 0.05) + 's';
            lbl.innerHTML = `
                <input type="radio" name="math-opt" value="${opt}">
                <span class="option-key">${key}</span>
                <span class="option-val">${opt}</span>
            `;
            lbl.addEventListener('click', () => submitAnswer(opt, lbl));
            optionsEl.appendChild(lbl);
        });

        startTimer();
    }

    function submitAnswer(val, selectedLabel) {
        if (answered) return;
        clearInterval(timerInterval);
        answered = true;
        disableOptions();

        const ans = questions[current].a;

        if (val === ans) {
            correct++;
            selectedLabel.classList.add('correct');
            const bonus = Math.round(timeLeft / TIMER_SECONDS * 50);
            score += POINTS_PER_CORRECT + bonus;
            streak++;
            if (streak > bestStreak) bestStreak = streak;
            scoreEl.textContent = score + ' pts';
            streakEl.textContent = streak >= 2 ? `🔥 ${streak}× Streak!` : '🔥 Streak!';
            streakEl.classList.toggle('show', streak >= 1);
            doFlash('correct');
            setTimeout(() => nextQuestion(), 700);
        } else {
            selectedLabel.classList.add('wrong');
            document.querySelectorAll('.option-label').forEach(lbl => {
                if (parseInt(lbl.querySelector('input').value) === ans) lbl.classList.add('correct');
            });
            streak = 0;
            streakEl.classList.remove('show');
            doFlash('wrong');
            setTimeout(() => nextQuestion(), 900);
        }
    }

    function doFlash(type) {
        flashEl.className = 'feedback-flash ' + (type === 'correct' ? 'correct-flash' : 'wrong-flash') + ' show';
        setTimeout(() => flashEl.className = 'feedback-flash', 350);
    }

    function nextQuestion() {
        current++;
        if (current < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-container').style.display = 'none';
        const pct = Math.round(correct / questions.length * 100);
        let emoji = '💀', title = 'Ouch...', sub = `${correct}/${questions.length} correct`;
        if (pct === 100) { emoji = '🏆'; title = 'Perfect Score!'; sub = 'You got them all right!'; }
        else if (pct >= 60) { emoji = '😎'; title = 'Nice Work!'; sub = `${correct}/${questions.length} correct`; }

        document.getElementById('result-emoji').textContent = emoji;
        document.getElementById('result-title').textContent = title;
        document.getElementById('result-sub').textContent = sub + (bestStreak >= 2 ? ` · Best streak: ${bestStreak}🔥` : '');
        document.getElementById('result-score').textContent = score;
        document.getElementById('result-screen').classList.add('show');
    }

    function startScare() {
        document.getElementById('result-screen').classList.remove('show');
        document.getElementById('jumpscare').style.display = 'block';
        document.getElementById('scream-sound').play().catch(() => {});
        document.body.classList.add('shaking');
    }

    document.getElementById('jumpscare').addEventListener('click', () => {
        document.getElementById('jumpscare').style.display = 'none';
        document.body.classList.remove('shaking');
        // Reset
        current = 0; score = 0; streak = 0; bestStreak = 0; correct = 0;
        scoreEl.textContent = '0 pts';
        streakEl.classList.remove('show');
        document.getElementById('game-container').style.display = '';
        loadQuestion();
    });

    // Keyboard A/B/C/D shortcuts
    document.addEventListener('keydown', e => {
        if (answered) return;
        const map = { 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
        if (e.key.toLowerCase() in map) {
            const labels = document.querySelectorAll('.option-label');
            const idx = map[e.key.toLowerCase()];
            if (labels[idx]) labels[idx].click();
        }
    });

    loadQuestion();
</script>
</body>
</html>
